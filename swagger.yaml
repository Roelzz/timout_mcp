swagger: "2.0"
info:
  title: MCP Timeout MCS
  description: >-
    Probe operations that sleep for a fixed number of seconds before responding.
    Use these to discover the timeout ceiling Microsoft Copilot Studio enforces
    on connector actions.
  version: "1.0.0"
host: timeoutmcp.test.roelschenk.com
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /delay_5s:
    get:
      operationId: delay_5s
      summary: Delay 5 seconds
      x-ms-summary: Delay 5 seconds
      description: Sleep for 5 seconds, then return a confirmation string with the current UTC timestamp.
      responses:
        "200":
          description: Successful response after the delay completed.
          schema:
            type: object
            properties:
              result:
                type: string
                description: Confirmation message including the elapsed delay.
              timestamp:
                type: string
                description: UTC ISO 8601 timestamp captured at response time.
